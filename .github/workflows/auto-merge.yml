name: Auto-merge claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR and merge to main
        run: |
          # Create PR
          PR_URL=$(gh pr create \
            --repo "$REPO" \
            --head "$BRANCH" \
            --base main \
            --title "Auto-merge: $BRANCH" \
            --body "Automated PR from $BRANCH" 2>/dev/null || echo "exists")

          # If PR already exists, get its number
          if [ "$PR_URL" = "exists" ]; then
            PR_URL=$(gh pr list --repo "$REPO" --head "$BRANCH" --json url -q '.[0].url')
          fi

          # Merge the PR
          gh pr merge "$PR_URL" --squash --repo "$REPO"
        env:
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
